%YAML 1.2
---
home:
  - .tool-versions: # asdf
      - alias_as: "tool-versions"
  - test

.config:
  - bat:
      - run_after: "bat cache --build"
  - cosmic
  - lazygit
  - fish:
      - run_after: "source ~/.config/fish/config.fish && fisher update"
  - ghostty
  - nvim:
      - run_before: "cp -r ~/.config/nvim ~/.config/nvim.bak"
